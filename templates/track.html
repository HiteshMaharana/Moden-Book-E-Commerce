<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Track Order</title>

    <link rel="stylesheet" href="track.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="track-container">

    <h2><i class="fa-solid fa-box"></i> Track Your Order</h2>

    <!-- ROUTE -->
    <div class="route-box">
        <p><i class="fa-solid fa-warehouse"></i> Mumbai Warehouse</p>
        <p><i class="fa-solid fa-location-dot"></i> Your Location</p>
    </div>

    <!-- STEPS ONLY (NO LINE) -->
    <div class="steps-container">

        <div class="step">
            <span><i class="fa-solid fa-check"></i></span>
            <p>Order Placed</p>
        </div>

        <div class="step">
            <span><i class="fa-solid fa-box-open"></i></span>
            <p>Shipped</p>
        </div>

        <div class="step">
            <span><i class="fa-solid fa-truck"></i></span>
            <p>Out for Delivery</p>
        </div>

        <div class="step">
            <span><i class="fa-solid fa-house"></i></span>
            <p>Delivered</p>
        </div>

    </div>

    <!-- MAP -->
    <div class="map-box">

        <h3><i class="fa-solid fa-map-location-dot"></i> Delivery Location</h3>

        <iframe src="https://maps.google.com/maps?q=India&output=embed"></iframe>

        <a href="#" class="map-btn">
            <i class="fa-solid fa-up-right-from-square"></i> Open in Maps
        </a>

    </div>

</div>

</body>
</html>
